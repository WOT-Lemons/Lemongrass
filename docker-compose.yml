services:
  telem:
    container_name: telem
    image: ghcr.io/wot-lemons/lemongrass-pi:${TAG:-latest}
    command: python telem.py
    restart: always
    devices:
      - /dev/obd:/dev/obd
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}

  pisugar-monitor:
    container_name: pisugar-monitor
    image: ghcr.io/wot-lemons/lemongrass-pi:${TAG:-latest}
    command: python pisugar-monitor.py
    restart: always
    network_mode: host
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}

  telegraf:
    container_name: telegraf
    image: telegraf:latest
    restart: always
    network_mode: host
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - INFLUX_TOKEN=${INFLUX_TOKEN}
