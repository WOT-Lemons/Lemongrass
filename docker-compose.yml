services:
  telem:
    container_name: telem
    image: ghcr.io/wot-lemons/lemongrass-pi:${TAG:-latest}
    command: python telem.py
    restart: always
    devices:
      - /dev/obd:/dev/obd
    environment:
      - INFLUX_TELEMETRY_TOKEN=${INFLUX_TELEMETRY_TOKEN}

  pisugar-monitor:
    container_name: pisugar-monitor
    image: ghcr.io/wot-lemons/lemongrass-pi:${TAG:-latest}
    command: python pisugar-monitor.py
    restart: always
    network_mode: host
    volumes:
      - /etc/pisugar-server/config.json:/etc/pisugar-server/config.json:ro
    environment:
      - INFLUX_TELEMETRY_TOKEN=${INFLUX_TELEMETRY_TOKEN}

  telegraf:
    container_name: telegraf
    image: telegraf@sha256:abd4f8eed229fc271394784dab7e21e6e4c4b56511dc9fe911b3bb0218baea20 # 1.38.3
    restart: always
    network_mode: host
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/hostfs:ro,rslave
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_MOUNT_PREFIX=/hostfs
      - INFLUX_SYSTEM_TOKEN=${INFLUX_SYSTEM_TOKEN}
