# Local-only test stack. Non-secret credentials are inlined on purpose so that
#   docker compose -f local-testing/docker-compose.yml up
# works with no --env-file flag. Do NOT use these values anywhere real.
name: lemongrass-local

services:
  influxdb:
    image: influxdb:2@sha256:9f29465df7a15d427e046681cfc7b3da9753e75825c6864f8d3cf5b3aa3cca3d
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: local-dev-password
      DOCKER_INFLUXDB_INIT_ORG: lemongrass
      DOCKER_INFLUXDB_INIT_BUCKET: laps
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: local-dev-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influx-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  grafana:
    image: grafana/grafana:12.4@sha256:26b8f35a9e4e4431995cf64c3f396505a4faf17bcfc19f9ed84943ec6bfd5ecd
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: local-dev-password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  elm327:
    build:
      context: elm327
    # Port comes from OBD_EMULATOR_PORT (.env); compose interpolates it into
    # this exec-form command, overriding the image's default CMD.
    command: ["python", "-m", "elm", "-s", "car", "-n", "${OBD_EMULATOR_PORT}"]
    stdin_open: true   # emulator's cmd console exits on stdin EOF
    healthcheck:
      # Healthy only once the emulator socket accepts connections, so telem
      # doesn't race the listener. python is present in the uv base image.
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', ${OBD_EMULATOR_PORT}), timeout=2).close()"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 2s

  telem:
    build:
      context: ..
      dockerfile: Dockerfile
    # Non-secret settings come from a generated TOML config (secrets-only env model).
    # Generated at startup so the emulator port stays sourced from OBD_EMULATOR_PORT
    # (compose interpolates ${OBD_EMULATOR_PORT} into the command, same as elm327).
    command:
      - /bin/sh
      - -c
      - |
        cat > /tmp/lemongrass.toml <<'TOML'
        [influx]
        url = "http://influxdb:8086"
        org = "lemongrass"

        [telem.obd]
        port = "socket://elm327:${OBD_EMULATOR_PORT}"
        baudrate = 38400
        TOML
        exec lemongrass telem
    environment:
      LEMONGRASS_CONFIG: /tmp/lemongrass.toml
      INFLUX_TELEMETRY_TOKEN: local-dev-token
    volumes:
      # Persist /data (the spool lives at /data/telem-spool) so buffered points
      # survive a telem restart — lets the outage->restart->recovery path be
      # exercised locally: stop influxdb, let points spool, restart telem, then
      # start influxdb and watch the spool drain.
      - telem-data:/data
    depends_on:
      influxdb:
        condition: service_healthy
      elm327:
        condition: service_healthy

volumes:
  influxdb-data:
  grafana-data:
  telem-data:
