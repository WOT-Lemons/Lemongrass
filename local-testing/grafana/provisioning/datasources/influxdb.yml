apiVersion: 1
datasources:
  # Default ad-hoc Flux datasource (kept for Explore; referenced by CONTRIBUTING).
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: lemongrass
      defaultBucket: laps
    secureJsonData:
      token: local-dev-token

  # InfluxQL datasources (v1 DBRP) — back the dashboard panels.
  - name: laps
    uid: wotl-laps-ql
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      dbName: laps
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Token local-dev-token

  - name: races
    uid: wotl-races-ql
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      dbName: races
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Token local-dev-token

  # OBD/telemetry InfluxQL datasources (v1 DBRP db=stats_252) — back the
  # telegraf, car252-pisugar-ups, and race-control OBD panels. UIDs match the
  # datasource UIDs baked into the dashboard JSON (copied from prod).
  - name: stats_252
    uid: ddpgw53c4nojkd
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      dbName: stats_252
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Token local-dev-token

  - name: stats_252_pisugar
    uid: f3134d95-85f2-4173-9d6b-5ce95b10bbd0
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      dbName: stats_252
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Token local-dev-token

  # Car OBD telemetry (vin-tagged) — backs the race-control OBD panels.
  - name: telem
    uid: wotl-telem-ql
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      dbName: telem
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Token local-dev-token

  # PiSugar host/UPS telemetry (host-tagged) — backs the pisugar dashboard.
  - name: pisugar
    uid: wotl-pisugar-ql
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      dbName: pisugar
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Token local-dev-token

  # Flux datasources — back the dashboard template variables.
  - name: laps_flux
    uid: wotl-laps-flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      version: Flux
      organization: lemongrass
      defaultBucket: laps
    secureJsonData:
      token: local-dev-token

  - name: races_flux
    uid: wotl-races-flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      version: Flux
      organization: lemongrass
      defaultBucket: races
    secureJsonData:
      token: local-dev-token

  - name: race_sessions_flux
    uid: wotl-race-sessions-flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    jsonData:
      version: Flux
      organization: lemongrass
      defaultBucket: race_sessions
    secureJsonData:
      token: local-dev-token
