name: Lock File Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/uv-lock-check.yml'

jobs:
  sync-lock:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.24"

      - name: Sync lock file (release-please PRs)
        run: |
          uv lock
          git config user.name "wot-lemons-release-please[bot]"
          git config user.email "279497434+wot-lemons-release-please[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync uv.lock"
          git push

  verify-lock:
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.24"

      - name: Verify lock file is up to date
        run: uv lock --check
