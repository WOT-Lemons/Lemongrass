name: Build and Push Image

on:
  push:
    tags:
      - 'v*'  # every release tag produces a new image; no paths filter is intentional
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - src/lemongrass/**
      - .github/workflows/docker-build.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: docker/github-builder/.github/workflows/build.yml@3415a188caae9a0da7fba83bc06985776e0b1790 # v1.14.0
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      sbom: true
      meta-images: ghcr.io/wot-lemons/lemongrass
      meta-tags: |
        type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
